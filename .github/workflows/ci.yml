name: CI
on:
  workflow_dispatch:
  push:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: mfinelli/setup-imagemagick@942263f1dcf8f4787bdf9e8905e3a864d1defff2 # v7.0.1
        with:
          install-libfuse2: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        # Only run when pushing to main branch.
        # NOTE: The repository's Pages source must be set to "Deploy from a branch"
        # with the gh-pages branch selected. Once the source is switched to
        # "GitHub Actions", this step can be replaced by actions/upload-pages-artifact
        # and actions/deploy-pages.
        if: github.ref == 'refs/heads/main'
        with:
          folder: dist
